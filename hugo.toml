baseURL = "https://anthonymineer.me/"
languageCode = "en-us"
title = "Anthony Mineer"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
paginate = 10

[params]
  author = "Anthony Mineer"
  description = "Cloud engineering, AI infrastructure, and platform thinking."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  assets.favicon          = "/favicon.ico"
  assets.favicon16x16     = "/favicon-16x16.png"
  assets.favicon32x32     = "/favicon-32x32.png"
  assets.apple_touch_icon = "/apple-touch-icon.png"
  assets.safari_pinned_tab = "/favicon.svg"

[params.homeInfoParams]
  Title = "Hey, I'm Anthony."
  Content = "Cloud engineering leader, tinkerer, and occasional writer. Field Notes is where I explore things in tech I find interesting — not always cloud, not always AI, just stuff worth digging into. Pull up a post."

[[params.socialIcons]]
  name = "email"
  url = "mailto:am@anthonymineer.me"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/anthony-m-73127650/"

[menu]
  [[menu.main]]
    name = "Field Notes"
    url = "/field-notes/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 3

[taxonomies]
  tag = "tags"
  series = "series"
